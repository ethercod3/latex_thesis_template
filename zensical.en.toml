[project]
site_name = "Diploma Project Documentation"
site_author = "Artyom Kupriianov"
docs_dir = "docs/en"
site_dir = "docs-site/en"
dev_addr = "0.0.0.0:8000"
repo_url = "https://github.com/ethercod3/diploma_latex"
repo_name = "ethercod3/diploma_latex"
copyright = "Copyright &copy; Artyom Kupriianov (ethercod3)"
nav = [
  {"Start" = [
    {"Introduction" = "README.md"},
    {"Requirements" = "requirements.md"},
    {"Common scenarios" = "common-scenarios.md"},
    {"Project structure" = "project-structure.md"},
    {"Quick start" = "quick-start.md"}
  ]},
  {"Build" = [
    {"Build without Docker" = "manual-build.md"},
    {"Docker" = "docker.md"},
    {"TeXstudio setup" = "texstudio.md"}
  ]},
  {"Artifacts" = [
    {"Title page and assignment" = "title-pages.md"},
    {"Source code in appendices" = "source-code.md"},
    {"Diagrams" = "diagrams.md"}
  ]},
  {"Tools" = [
    {"PDF comparison between commits" = "pdf-diff.md"},
    {"Compilation issues" = "troubleshooting.md"},
    {"Git hooks" = "git-hooks.md"},
    {"Backups" = "backup.md"},
    {"CI/CD and releases" = "ci.md"},
    {"Documentation" = "zensical.md"}
  ]},
  {"Legal information" = ["legal.md"]}
]

[project.theme]
language = "en"
features = [
  "content.tabs.link",
  "content.code.copy",
  "navigation.tracking",
  "navigation.top",
  "search.highlight",
  "content.footnote.tooltips",
  "content.tooltips",
  "navigation.sections",
  "toc.follow"
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "teal"
accent = "teal"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "teal"
accent = "teal"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.zensical.extensions.macros]
module_name = "docs/macros/docs_macros"
on_error_fail = true
on_undefined = "strict"

[project.markdown_extensions.attr_list]
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
[project.markdown_extensions.pymdownx.snippets]
auto_append = ["../includes/abbreviations.en.md"]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[[project.extra.alternate]]
name = "Русский"
link = "/"
lang = "ru"

[[project.extra.alternate]]
name = "English"
link = "/en/"
lang = "en"

[[project.extra.social]]
icon = "fontawesome/brands/telegram"
link = "https://t.me/eth3ria1"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/ethercod3"
