version: '3'

tasks:
  check:
    desc: Проверить наличие инструментов для сборки проекта
    cmds:
      - python scripts/check_tools.py

  deps:
    desc: Установить Python-зависимости для локальных скриптов
    cmds:
      - python -m pip install -r requirements.txt

  hooks:
    desc: Подключить локальные Git hooks проекта
    cmds:
      - git config core.hooksPath .githooks

  clean:
    desc: Удалить сгенерированные артефакты сборки и кэши
    cmds:
      - python scripts/clean.py

  clean:docker:
    desc: Остановить и удалить контейнеры/сети текущего Docker Compose-проекта
    cmds:
      - python scripts/clean_docker.py

  clean:docker:dry:
    desc: Показать Docker-команду очистки проекта без выполнения
    cmds:
      - python scripts/clean_docker.py --dry-run

  clean:docker:images:
    desc: Удалить контейнеры/сети и локальные образы текущего Docker Compose-проекта
    cmds:
      - python scripts/clean_docker.py --images

  clean:dry:
    desc: Показать, какие артефакты удалит task clean
    cmds:
      - python scripts/clean.py --dry-run

  backup:
    desc: Создать git bundle и загрузить бэкап через rclone
    cmds:
      - python scripts/backup_project.py {{.CLI_ARGS}}

  backup:dry:
    desc: Проверить создание bundle и показать rclone-операции без загрузки и удаления
    cmds:
      - python scripts/backup_project.py --dry-run {{.CLI_ARGS}}

  backup:local:
    desc: Создать и проверить локальный git bundle без загрузки в облако
    cmds:
      - python scripts/backup_project.py --local-only {{.CLI_ARGS}}

  hash:
    desc: Обновить контрольные суммы PDF в README.md
    cmds:
      - python scripts/update_pdf_hash.py {{.CLI_ARGS}}

  diff:
    desc: Сравнить PDF между коммитами; аргументы передаются после --
    cmds:
      - python scripts/diff_pdf_commits.py {{.CLI_ARGS}}
