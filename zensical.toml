[project]
site_name = "Документация проекта диплома"
site_author = "Artyom Kupriianov"
docs_dir = "docs/ru"
site_dir = "docs-site"
dev_addr = "0.0.0.0:8000"
repo_url = "https://github.com/ethercod3/diploma_latex"
repo_name = "ethercod3/diploma_latex"
copyright = "Copyright &copy; Artyom Kupriianov (ethercod3)"
nav = [
  {"Начало" = [
    {"Введение" = "README.md"},
    {"Что нужно установить" = "requirements.md"},
    {"Частые сценарии" = "common-scenarios.md"},
    {"Структура проекта" = "project-structure.md"},
    {"Быстрый старт" = "quick-start.md"}
  ]},
  {"Сборка" = [
    {"Сборка без Docker" = "manual-build.md"},
    {"Docker" = "docker.md"},
    {"Настройка TeXstudio" = "texstudio.md"}
  ]},
  {"Артефакты" = [
    {"Титульник и задание" = "title-pages.md"},
    {"Код в приложениях" = "source-code.md"},
    {"Диаграммы" = "diagrams.md"}
  ]},
  {"Инструменты" = [
    {"Сравнение PDF между коммитами" = "pdf-diff.md"},
    {"Проблемы с компиляцией" = "troubleshooting.md"},
    {"Git hooks" = "git-hooks.md"},
    {"Документация" = "zensical.md"}
  ]},
  {"Юридическая информация" = ["legal.md"]}
]

[project.theme]
language = "ru"
features = [
  "content.tabs.link",
  "content.code.copy",
  "navigation.tracking",
  "navigation.top",
  "search.highlight",
  "content.footnote.tooltips",
  "content.tooltips",
  "navigation.sections",
  "toc.follow"
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "teal"
accent = "teal"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "teal"
accent = "teal"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.zensical.extensions.macros]
module_name = "docs/macros/docs_macros"
on_error_fail = true
on_undefined = "strict"

[project.markdown_extensions.attr_list]
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
[project.markdown_extensions.pymdownx.snippets]
auto_append = ["../includes/abbreviations.md"]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[[project.extra.alternate]]
name = "Русский"
link = "/"
lang = "ru"

[[project.extra.alternate]]
name = "English"
link = "/en/"
lang = "en"

[[project.extra.social]]
icon = "fontawesome/brands/telegram"
link = "https://t.me/eth3ria1"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/ethercod3"
