name: Check tools exe CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "scripts/check_tools.py"
      - "scripts/check_tools_lib/**"
      - "scripts/check_tools_exe.py"
      - "scripts/check_python_requirements.py"
      - "scripts/common.py"
      - "scripts/ci/release_check_tools.py"
      - ".github/tasks/check-tools-exe.yml"
      - ".github/workflows/check-tools-exe.yml"
  pull_request:
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - "scripts/check_tools.py"
      - "scripts/check_tools_lib/**"
      - "scripts/check_tools_exe.py"
      - "scripts/check_python_requirements.py"
      - "scripts/common.py"
      - "scripts/ci/release_check_tools.py"
      - ".github/tasks/check-tools-exe.yml"
      - ".github/workflows/check-tools-exe.yml"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13.13"
          enable-cache: true

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Install build dependencies
        run: task --taskfile .github/tasks/check-tools-exe.yml deps

      - name: Build exe
        run: task --taskfile .github/tasks/check-tools-exe.yml build

      - name: Smoke test exe
        run: task --taskfile .github/tasks/check-tools-exe.yml smoke

      - name: Create SHA256 checksum
        run: task --taskfile .github/tasks/check-tools-exe.yml checksum

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: diploma-latex-check-windows-x64
          path: |
            dist/diploma-latex-check.exe
            dist/SHA256SUMS.txt
