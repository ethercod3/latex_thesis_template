name: Release check tools exe

on:
  push:
    tags:
      - "v*"
      - "[0-9]*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to, for example 0.2.0 or v0.2.0"
        required: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.16"
          enable-cache: true

      - name: Verify uv
        run: uv --version

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Install build dependencies
        run: task --taskfile .github/tasks/check-tools-exe.yml deps

      - name: Build exe
        run: task --taskfile .github/tasks/check-tools-exe.yml build

      - name: Smoke test exe
        run: task --taskfile .github/tasks/check-tools-exe.yml smoke

      - name: Create SHA256 checksum
        run: task --taskfile .github/tasks/check-tools-exe.yml checksum

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: task --taskfile .github/tasks/check-tools-exe.yml release
