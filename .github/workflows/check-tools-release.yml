name: Release check tools exe

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Install build dependencies
        run: task --taskfile .github/tasks/check-tools-exe.yml deps

      - name: Build exe
        run: task --taskfile .github/tasks/check-tools-exe.yml build

      - name: Smoke test exe
        run: task --taskfile .github/tasks/check-tools-exe.yml smoke

      - name: Create SHA256 checksum
        run: task --taskfile .github/tasks/check-tools-exe.yml checksum

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: task --taskfile .github/tasks/check-tools-exe.yml release
