name: Release PDF

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.3"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LaTeX repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Checkout diploma code repo
        uses: actions/checkout@v4
        with:
          repository: ethercod3/diploma_code
          token: ${{ secrets.VIEW_DIPLOMA_CODE }}
          path: vault_diploma

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Prepare CI environment
        run: |
          {
            echo 'VAULT_PATH="/vault_code"'
            echo 'VAULT_OS_PATH="./vault_diploma"'
            echo 'TARGET="Куприянов_И221_диплом.tex"'
            echo "HOST_UID=$(id -u)"
            echo "HOST_GID=$(id -g)"
          } > .env

      - name: Build PDF
        run: task build

      - name: Download latest check tool assets
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          LATEST_TAG="$(gh release list --exclude-drafts --exclude-pre-releases --limit 20 --json tagName --jq '.[] | select(.tagName != "'"$CURRENT_TAG"'") | .tagName' | head -n 1)"
          if [ -z "$LATEST_TAG" ]; then
            echo "No previous release found; skipping check tool assets."
            exit 0
          fi

          echo "Downloading check tool assets from $LATEST_TAG"
          gh release download "$LATEST_TAG" --pattern "diploma-latex-check.exe" --dir dist --clobber || true
          gh release download "$LATEST_TAG" --pattern "checktool-windows-x64.exe" --dir dist --clobber || true
          gh release download "$LATEST_TAG" --pattern "SHA256SUMS.txt" --dir dist --clobber || true
          gh release download "$LATEST_TAG" --pattern "checktool-SHA256SUMS.txt" --dir dist --clobber || true

          if [ -f dist/checktool-windows-x64.exe ] && [ ! -f dist/diploma-latex-check.exe ]; then
            cp dist/checktool-windows-x64.exe dist/diploma-latex-check.exe
          fi

          if [ -f dist/checktool-SHA256SUMS.txt ] && [ ! -f dist/SHA256SUMS.txt ]; then
            cp dist/checktool-SHA256SUMS.txt dist/SHA256SUMS.txt
          fi

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          PDF_PATH: Куприянов_И221_диплом.pdf
        run: |
          set -euo pipefail

          gh release view "$CURRENT_TAG" >/dev/null 2>&1 || gh release create "$CURRENT_TAG" \
            --title "$CURRENT_TAG" \
            --notes "Автоматическая сборка PDF."

          gh release upload "$CURRENT_TAG" "$PDF_PATH#pdf-Куприянов_И221_диплом.pdf" --clobber

          if [ -f dist/diploma-latex-check.exe ]; then
            gh release upload "$CURRENT_TAG" "dist/diploma-latex-check.exe#checktool-windows-x64.exe" --clobber
          fi

          if [ -f dist/SHA256SUMS.txt ]; then
            gh release upload "$CURRENT_TAG" "dist/SHA256SUMS.txt#checktool-SHA256SUMS.txt" --clobber
          fi
