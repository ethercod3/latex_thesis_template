name: Release PDF

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.3"
        required: true
  schedule:
    # 04:00 Asia/Yakutsk (UTC+9)
    - cron: "0 19 * * *"
  workflow_run:
    workflows:
      - Release check tools exe
    types:
      - completed

permissions:
  contents: write

jobs:
  release-pdf:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LaTeX repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || (github.event_name == 'workflow_dispatch' && inputs.tag || github.ref) }}

      - name: Resolve release context
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: python scripts/ci/resolve_pdf_release_context.py

      - name: Checkout diploma code repo
        uses: actions/checkout@v4
        with:
          repository: ethercod3/diploma_code
          token: ${{ secrets.VIEW_DIPLOMA_CODE }}
          path: vault_diploma

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Prepare CI environment
        run: python scripts/ci/prepare_pdf_release_env.py

      - name: Build PDF
        run: task build

      - name: Download latest check tool assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/ci/download_latest_checktool_assets.py

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/ci/publish_pdf_release.py
