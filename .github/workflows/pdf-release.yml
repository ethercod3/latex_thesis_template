name: Release PDF

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: "Build PDF workflow run id to publish"
        required: true
      force_archive_publish:
        description: "Publish PDF archive even if no source files changed since the latest archive build"
        required: false
        default: false
        type: boolean
  workflow_run:
    workflows:
      - Build PDF
    types:
      - completed

permissions:
  contents: write
  actions: read

env:
  PDF_ARCHIVE_REPOSITORY: ${{ vars.PDF_ARCHIVE_REPOSITORY }}
  PDF_ARCHIVE_BRANCH: ${{ vars.PDF_ARCHIVE_BRANCH || 'main' }}
  PDF_ARCHIVE_MAX_BUILDS: ${{ vars.PDF_ARCHIVE_MAX_BUILDS || '50' }}

jobs:
  release-pdf:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LaTeX repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.16"
          enable-cache: true

      - name: Set up Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "0.112.2"

      - name: Verify uv
        run: uv --version

      - name: Verify Nushell
        run: nu --version

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Download PDF release artifact
        uses: actions/download-artifact@v4
        with:
          name: pdf-release-assets
          path: .
          github-token: ${{ github.token }}
          run-id: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.id || inputs.build_run_id }}

      - name: Load release context
        run: cat dist/release-context.env >> "$GITHUB_ENV"

      - name: Check PDF archive access
        env:
          PDF_ARCHIVE_TOKEN: ${{ secrets.PDF_ARCHIVE_TOKEN }}
        run: nu scripts/ci/check_pdf_archive_access.nu

      - name: Install qpdf
        run: sudo apt-get update && sudo apt-get install --yes qpdf

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: uv run python scripts/ci/publish_pdf_release.py

      - name: Publish PDF archive
        env:
          PDF_ARCHIVE_TOKEN: ${{ secrets.PDF_ARCHIVE_TOKEN }}
        shell: nu {0}
        run: |
          let args = if "${{ github.event_name == 'workflow_dispatch' && inputs.force_archive_publish || false }}" == "true" {
            ["--force"]
          } else {
            []
          }

          nu scripts/ci/publish_pdf_archive.nu ...$args
