name: Release PDF

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.3"
        required: true
  schedule:
    # 04:00 Asia/Yakutsk (UTC+9)
    - cron: "0 19 * * *"
  workflow_run:
    workflows:
      - Release check tools exe
    types:
      - completed

permissions:
  contents: write

env:
  PDF_ARCHIVE_REPOSITORY: ${{ vars.PDF_ARCHIVE_REPOSITORY || 'ethercod3/diploma-pdf-archive' }}
  PDF_ARCHIVE_BRANCH: ${{ vars.PDF_ARCHIVE_BRANCH || 'main' }}
  PDF_ARCHIVE_MAX_BUILDS: ${{ vars.PDF_ARCHIVE_MAX_BUILDS || '50' }}

jobs:
  release-pdf:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LaTeX repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || ((github.event_name == 'workflow_dispatch' && inputs.tag != 'nightly') && inputs.tag || github.ref) }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.16"
          enable-cache: true

      - name: Set up Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: "0.112.2"

      - name: Verify uv
        run: uv --version

      - name: Verify Nushell
        run: nu --version

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Resolve release context
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: uv run python scripts/ci/resolve_pdf_release_context.py

      - name: Checkout diploma code repo
        uses: actions/checkout@v4
        with:
          repository: ethercod3/diploma_code
          token: ${{ secrets.VIEW_DIPLOMA_CODE }}
          path: vault_diploma

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2
        with:
          version: latest

      - name: Expose GitHub Actions runtime for Docker cache
        uses: crazy-max/ghaction-github-runtime@v3

      - name: Prepare CI environment
        run: uv run python scripts/ci/prepare_pdf_release_env.py

      - name: Build PDF
        env:
          COMPOSE_FILE: docker-compose.yaml:docker-compose.ci-cache.yaml
          DOCKER_BUILDKIT: "1"
        run: task build

      - name: Download latest check tool assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: uv run python scripts/ci/download_latest_checktool_assets.py

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: uv run python scripts/ci/publish_pdf_release.py

      - name: Publish PDF archive
        env:
          PDF_ARCHIVE_TOKEN: ${{ secrets.PDF_ARCHIVE_TOKEN }}
        run: nu scripts/ci/publish_pdf_archive.nu
