name: Build PDF

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.3"
        required: true
  schedule:
    # 04:00 Asia/Yakutsk (UTC+9)
    - cron: "0 19 * * *"
  workflow_run:
    workflows:
      - Release check tools exe
    types:
      - completed

permissions:
  contents: read
  actions: read

env:
  PDF_ARTIFACT_RETENTION_DAYS: ${{ vars.PDF_ARTIFACT_RETENTION_DAYS || '14' }}

jobs:
  build-pdf:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout LaTeX repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || ((github.event_name == 'workflow_dispatch' && inputs.tag != 'nightly') && inputs.tag || github.ref) }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.16"
          enable-cache: true

      - name: Verify uv
        run: uv --version

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Resolve release context
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: uv run python scripts/ci/resolve_pdf_release_context.py

      - name: Checkout diploma code repo
        uses: actions/checkout@v4
        with:
          repository: ethercod3/diploma_code
          token: ${{ secrets.VIEW_DIPLOMA_CODE }}
          path: vault_diploma

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: latest

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2
        with:
          version: latest

      - name: Expose GitHub Actions runtime for Docker cache
        uses: crazy-max/ghaction-github-runtime@v3

      - name: Prepare CI environment
        run: uv run python scripts/ci/prepare_pdf_release_env.py

      - name: Build PDF
        env:
          COMPOSE_FILE: docker-compose.yaml:docker-compose.ci-cache.yaml
          DOCKER_BUILDKIT: "1"
        run: task build

      - name: Download latest check tool assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: uv run python scripts/ci/download_latest_checktool_assets.py

      - name: Save release context
        run: |
          mkdir -p dist
          {
            echo "CURRENT_TAG=${CURRENT_TAG}"
            echo "CHECKTOOL_SOURCE_TAG=${CHECKTOOL_SOURCE_TAG}"
          } > dist/release-context.env

      - name: Upload PDF release artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-release-assets
          retention-days: ${{ env.PDF_ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error
          path: |
            Куприянов_И221_диплом.pdf
            dist/diploma-latex-check.exe
            dist/SHA256SUMS.txt
            dist/release-context.env
