name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Set up Task
        uses: arduino/setup-task@v2

      - name: Install dependencies
        run: task deps

      - name: Run linter
        run: task python:lint

      - name: Run tests
        run: task python:test

      - name: Build pages
        run: task docs:build:pages