version: '3'

tasks:
  deps:
    desc: Install dependencies for the check tools exe build
    dir: ../..
    cmds:
      - python -m pip install --upgrade pip
      - python -m pip install -r requirements.txt
      - python -m pip install pyinstaller

  build:
    desc: Build the Windows check tools exe
    dir: ../..
    cmds:
      - pyinstaller --onefile --name diploma-latex-check --paths scripts scripts/check_tools.py

  smoke:
    desc: Run the generated exe without failing on missing runner tools
    dir: ../..
    cmds:
      - python scripts/check_tools_exe.py smoke

  checksum:
    desc: Create SHA256SUMS.txt for the generated exe
    dir: ../..
    cmds:
      - python scripts/check_tools_exe.py checksum

  release:
    desc: Upload the generated exe and checksum to GitHub Release assets
    dir: ../..
    cmds:
      - python scripts/ci/release_check_tools.py
