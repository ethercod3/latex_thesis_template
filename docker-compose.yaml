services:
  latex:
    profiles: ["latex"]
    build:
      context: .
      dockerfile: ./docker/latex.dockerfile
    volumes:
      - ./:/data
      - ${VAULT_OS_PATH}:${VAULT_PATH}
    working_dir: /data
    command: ["python3", "scripts/build_latex_docker.py"]
    env_file:
      - ./.env

  mermaid_diagrams:
    profiles: ["mermaid"]
    build:
      context: .
      dockerfile: ./docker/mermaid.dockerfile
    env_file:
      - ./.env
    volumes:
      - ./figures:/data/figures
    command: ["python3", "scripts/compile_mermaid.py"]

  python_diagrams:
    profiles: ["python"]
    build:
      context: .
      dockerfile: ./docker/python.dockerfile
    env_file:
      - ./.env
    volumes:
      - ./figures:/data/figures
    command: ["python", "scripts/compile_python_diagrams.py"]

  docx_pdf:
    profiles: ["docx"]
    build:
      context: .
      dockerfile: ./docker/docx.dockerfile
    volumes:
      - ./:/data
    working_dir: /data
    command: ["python3", "/data/scripts/convert_docx_to_pdf.py"]

  docs:
    profiles: ["docs"]
    image: zensical/zensical:0.0.40
    volumes:
      - ./:/data
    working_dir: /data
    ports:
      - "8000:8000"
    entrypoint: ["sh", "-lc"]
    command: ["zensical serve --config-file zensical.toml"]
