services:
  latex:
    profiles: ["latex"]
    build:
      context: .
      dockerfile: ./docker/latex.dockerfile
    volumes:
      - ./:/data
      - ${VAULT_OS_PATH}:${VAULT_PATH}
    working_dir: /data
    command: ["python3", "scripts/build_latex_docker.py"]
    env_file:
      - ./.env

  mermaid_diagrams:
    profiles: ["mermaid"]
    build:
      context: .
      dockerfile: ./docker/mermaid.dockerfile
    env_file:
      - ./.env
    volumes:
      - ./figures:/data/figures
    command: ["python3", "scripts/compile_mermaid.py"]

  python_diagrams:
    profiles: ["python"]
    build:
      context: .
      dockerfile: ./docker/python.dockerfile
    env_file:
      - ./.env
    volumes:
      - ./figures:/data/figures
    command: ["python", "scripts/compile_python_diagrams.py"]

  docx_pdf:
    profiles: ["docx"]
    build:
      context: .
      dockerfile: ./docker/docx.dockerfile
    volumes:
      - ./:/data
    working_dir: /data
    command: ["python3", "/data/scripts/convert_docx_to_pdf.py"]

  docs:
    profiles: ["docs"]
    image: peaceiris/mdbook@sha256:a82fd90af897238521c17e4b64479f5d56b578e4776198788256086b3a59617a
    volumes:
      - ./docs-book:/book
    working_dir: /book
    ports:
      - "3000:3000"
    command: ["serve", "--hostname", "0.0.0.0", "--port", "3000"]
