services:
  latex:
    profiles: ["latex"]
    build:
      context: .
      dockerfile: ./docker/latex.dockerfile
    volumes:
      - ./:/data
      - ${VAULT_OS_PATH}:${VAULT_PATH}
    working_dir: /data
    command: sh -c "latexmk ${TARGET}"
    env_file:
      - ./.env

  mermaid_diagrams:
    profiles: ["mermaid"]
    build:
      context: .
      dockerfile: ./docker/mermaid.dockerfile
    env_file:
      - ./.env
    volumes:
      - ./figures:/data/figures
    command: ["python3", "compile_mermaid.py"]

  python_diagrams:
    profiles: ["python"]
    build:
      context: .
      dockerfile: ./docker/python.dockerfile
    env_file:
      - ./.env
    volumes:
      - ./figures:/data/figures
    command: ["sh", "compile_python.sh"]

  docx_pdf:
    profiles: ["docx"]
    build:
      context: .
      dockerfile: ./docker/docx.dockerfile
    volumes:
      - ./:/data
    working_dir: /data
    command: ["convert_docx_to_pdf.sh"]
